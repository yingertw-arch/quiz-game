<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校園實境解謎</title>
  <style>
    /* ── 基礎重置 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── 首頁背景圖 ── */
    #login-bg {
      position: fixed;
      inset: 0;
      background: url('school.jpg') center center / cover no-repeat;
      z-index: 0;
      transition: opacity 0.6s ease;
    }
    /* 深色遮罩讓文字清晰 */
    #login-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    /* 遊戲/勝利畫面時隱藏背景圖，改用深色漸層 */
    body.in-game {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    body.in-game #login-bg { opacity: 0; pointer-events: none; }
    body.in-game .stars    { opacity: 1; }

    /* ── 星星背景（遊戲時顯示） ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d, 3s) infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.2; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.4); }
    }

    /* ── 共用卡片 ── */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 40px;
      width: min(480px, 92vw);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(90deg, #e94560, #f5a623);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    /* ── 登入表單 ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }
    label {
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }
    input[type="text"],
    input[type="password"],
    input[type="number"] {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 12px 16px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    input:focus {
      border-color: #e94560;
      box-shadow: 0 0 0 3px rgba(233,69,96,0.25);
    }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, #e94560, #f5a623);
      color: #fff;
      box-shadow: 0 6px 24px rgba(233,69,96,0.4);
    }
    .btn-primary:hover { box-shadow: 0 8px 32px rgba(233,69,96,0.6); }

    /* ── 遊戲主畫面 ── */
    #game-screen {
      display: none;
      flex-direction: column;
      width: min(600px, 96vw);
    }

    .progress-bar-wrap {
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      height: 8px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #f5a623);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* ── 提示橫幅 ── */
    .hint-banner {
      background: linear-gradient(135deg, rgba(245,166,35,0.18), rgba(233,69,96,0.18));
      border: 1px solid rgba(245,166,35,0.4);
      border-radius: 12px;
      padding: 10px 16px;
      color: #fde68a;
      font-size: 0.88rem;
      font-weight: 600;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 16px;
      letter-spacing: 0.03em;
    }

    .level-badge {
      text-align: center;
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
    .level-badge span { color: #f5a623; font-weight: 700; font-size: 1rem; }

    .img-wrap {
      width: 100%;
      aspect-ratio: 3/2;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.15);
      margin-bottom: 20px;
      position: relative;
      background: rgba(0,0,0,0.3);
    }
    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* 圖片載入失敗時的佔位 */
    .img-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.3);
      font-size: 0.85rem;
      gap: 8px;
    }
    .img-placeholder .icon { font-size: 3rem; }

    .answer-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }
    .answer-row input {
      width: 100%;
      text-align: center;
      font-size: 1.4rem;
      letter-spacing: 0.15em;
      padding: 14px;
    }
    .answer-row .btn { width: 100%; padding: 15px; font-size: 1.1rem; }

    /* ── 回饋訊息 ── */
    .feedback {
      border-radius: 12px;
      padding: 12px 16px;
      text-align: center;
      font-weight: 700;
      font-size: 1rem;
      display: none;
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .feedback.correct {
      background: rgba(34,197,94,0.2);
      border: 1px solid rgba(34,197,94,0.5);
      color: #4ade80;
    }
    .feedback.wrong {
      background: rgba(239,68,68,0.2);
      border: 1px solid rgba(239,68,68,0.5);
      color: #f87171;
    }

    /* ── 震動動畫（答錯） ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-6px); }
      80%      { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }

    /* ── 勝利畫面 ── */
    #win-screen { display: none; text-align: center; }
    .trophy { font-size: 5rem; margin-bottom: 16px; animation: bounce 1s infinite alternate; }
    @keyframes bounce {
      from { transform: translateY(0) rotate(-5deg); }
      to   { transform: translateY(-16px) rotate(5deg); }
    }
    .win-title {
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(90deg, #ffd700, #ff6b6b, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .win-sub { color: rgba(255,255,255,0.6); margin-bottom: 28px; }
    .firework { position: fixed; pointer-events: none; z-index: 999; }

    /* ── 輸入框答案錯誤時紅框 ── */
    input.input-wrong { border-color: #ef4444 !important; }
    input.input-correct { border-color: #22c55e !important; }

    /* ══════════════════════════════════
       ── 平板／手機 響應式版面 ──
    ══════════════════════════════════ */

    /* 平板橫式 & 大螢幕平板（1024px 以下） */
    @media (max-width: 1024px) {
      body {
        align-items: flex-start;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 20px 0 40px;
      }
      .card {
        width: min(720px, 92vw);
        padding: 32px 28px;
        margin: auto;
      }
      #game-screen { width: min(720px, 92vw); }
      .congrats-box { width: min(520px, 88vw); padding: 40px 32px 28px; }
    }

    /* 平板直式（768px 以下） */
    @media (max-width: 820px) {
      body { padding: 12px 0 32px; }
      .card {
        width: 95vw;
        padding: 24px 20px;
        border-radius: 18px;
      }
      #game-screen { width: 95vw; }

      h1 { font-size: 1.65rem; }
      .subtitle { font-size: 0.85rem; margin-bottom: 20px; }

      .hint-banner { font-size: 0.82rem; padding: 9px 13px; }

      .img-wrap { aspect-ratio: 4/3; }

      input[type="text"],
      input[type="password"],
      input[type="number"] { font-size: 1.1rem; padding: 14px 16px; }

      .btn { padding: 15px; font-size: 1.05rem; }

      .congrats-box { padding: 32px 20px 24px; }
      .congrats-title { font-size: 1.6rem; }
      .congrats-emoji { font-size: 3.8rem; }
      .congrats-msg { font-size: 0.95rem; }
      .congrats-location { font-size: 0.88rem; }
    }

    /* 手機（480px 以下） */
    @media (max-width: 480px) {
      .card { width: 98vw; padding: 18px 14px; border-radius: 14px; }
      #game-screen { width: 98vw; }
      h1 { font-size: 1.4rem; }
      .img-wrap { aspect-ratio: 1/1; }
    }

    /* ── 恭喜彈出畫面 ── */
    #congrats-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      animation: fadeIn 0.3s ease;
    }
    #congrats-overlay.show { display: flex; }

    .congrats-box {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 2px solid rgba(255,215,0,0.5);
      border-radius: 28px;
      padding: 48px 40px 36px;
      text-align: center;
      width: min(420px, 88vw);
      box-shadow: 0 0 60px rgba(255,215,0,0.25);
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .congrats-emoji { font-size: 4.5rem; margin-bottom: 12px; display: block; animation: bounce 0.8s infinite alternate; }
    .congrats-title {
      font-size: 1.9rem;
      font-weight: 900;
      background: linear-gradient(90deg, #ffd700, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .congrats-msg {
      color: #e0e0e0;
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    /* 地點說明語句 */
    .congrats-location {
      background: rgba(255,255,255,0.08);
      border-left: 3px solid #ffd700;
      border-radius: 8px;
      padding: 10px 14px;
      color: #ffffffcc;
      font-size: 0.92rem;
      line-height: 1.6;
      text-align: left;
      margin-bottom: 20px;
      animation: fadeIn 0.5s ease 0.3s both;
    }
    .congrats-location strong {
      color: #ffd700;
      display: block;
      margin-bottom: 2px;
      font-size: 0.85rem;
    }

    /* confetti canvas */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 99;
    }

    .congrats-countdown {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
    }
    .countdown-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid rgba(255,215,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 800;
      color: #ffd700;
    }

    /* ── 鎖定畫面 ── */
    #lock-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      animation: fadeIn 0.3s ease;
    }
    #lock-overlay.show { display: flex; }
    .lock-box {
      background: linear-gradient(135deg, #1a0a0a, #2d0f0f);
      border: 2px solid rgba(239,68,68,0.6);
      border-radius: 28px;
      padding: 48px 40px 40px;
      text-align: center;
      width: min(380px, 88vw);
      box-shadow: 0 0 80px rgba(239,68,68,0.3);
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .lock-icon { font-size: 4rem; margin-bottom: 16px; display: block; }
    .lock-title {
      font-size: 1.7rem;
      font-weight: 900;
      color: #f87171;
      margin-bottom: 10px;
    }
    .lock-msg {
      color: rgba(255,255,255,0.65);
      font-size: 0.95rem;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .lock-timer {
      font-size: 3rem;
      font-weight: 900;
      color: #fca5a5;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
    }
    .lock-timer-label {
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
      margin-top: 6px;
    }
  </style>
</head>

<!-- 首頁背景圖 -->
<div id="login-bg"></div>

<!-- 星星背景 -->
<div class="stars" id="stars"></div>

<!-- ① 登入畫面 -->
<div class="card" id="login-screen">
  <h1>🏫 校園實境解謎</h1>
  <p class="subtitle">輸入帳號密碼，開始挑戰 16 關！</p>
  <div class="field">
    <label for="username">帳號</label>
    <input type="text" id="username" placeholder="請輸入帳號" autocomplete="off" />
  </div>
  <div class="field">
    <label for="password">密碼</label>
    <input type="password" id="password" placeholder="請輸入密碼" />
  </div>
  <p id="login-error" style="color:#f87171;font-size:0.85rem;text-align:center;margin-bottom:12px;display:none;">
    帳號或密碼錯誤，請再試一次！
  </p>
  <button class="btn btn-primary" onclick="doLogin()">開始闖關 🚀</button>
</div>

<!-- ② 遊戲畫面 -->
<div class="card" id="game-screen">
  <div class="hint-banner">
    📜 請觀察圖片，找到形容該圖片的詩句，填入詩句的編號（1–16）
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
  <p class="level-badge">第 <span id="level-num">1</span> 關 / 16</p>
  <div class="img-wrap">
    <img id="game-img" src="" alt="關卡圖片" onerror="this.style.display='none';document.getElementById('img-placeholder').style.display='flex'" />
    <div class="img-placeholder" id="img-placeholder" style="display:none">
      <span class="icon">🖼️</span>
      <span id="placeholder-text">圖片載入中…</span>
    </div>
  </div>
  <div class="answer-row">
    <input type="number" id="answer-input" placeholder="輸入答案數字" min="0" />
    <button class="btn btn-primary" onclick="checkAnswer()">確認</button>
  </div>
  <div class="feedback" id="feedback"></div>
</div>

<!-- ② 恭喜彈出畫面 -->
<div id="congrats-overlay">
  <canvas id="confetti-canvas"></canvas>
  <div class="congrats-box">
    <span class="congrats-emoji" id="congrats-emoji">🎉</span>
    <div class="congrats-title">答對了！</div>
    <div class="congrats-msg" id="congrats-msg"></div>
    <div class="congrats-location" id="congrats-location"></div>
    <div class="congrats-countdown">
      <span class="countdown-circle" id="countdown-num">5</span>
      <span>秒後進入下一關</span>
    </div>
  </div>
</div>

<!-- ④ 鎖定畫面 -->
<div id="lock-overlay">
  <div class="lock-box">
    <span class="lock-icon">🔒</span>
    <div class="lock-title">畫面已鎖定</div>
    <div class="lock-msg">連續答錯 3 次！<br>請稍候再繼續挑戰。</div>
    <div class="lock-timer" id="lock-timer">3:00</div>
    <div class="lock-timer-label">解鎖倒數</div>
  </div>
</div>

<!-- ③ 勝利畫面 -->
<div class="card" id="win-screen">
  <div class="trophy">🏆</div>
  <div class="win-title">闖關成功！</div>
  <p class="win-sub">恭喜你完成全部 16 關挑戰！</p>
  <button class="btn btn-primary" onclick="restartGame()">再玩一次 🔄</button>
</div>

};

let currentLevel = 0;
let answerLocked  = false;
let countdownTimer = null;
let confettiAnim  = null;
let wrongStreak   = 0;
let lockTimer     = null;

// ── 星星背景生成 ──
(function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --d:${(Math.random()*3+1).toFixed(1)}s;
      animation-delay:${(Math.random()*3).toFixed(1)}s;
    `;
    container.appendChild(s);
  }
})();

// ── Enter 鍵支援 ──
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (!document.getElementById('login-screen').style.display ||
        document.getElementById('login-screen').style.display !== 'none') {
      doLogin();
    } else if (document.getElementById('game-screen').style.display === 'flex') {
      checkAnswer();
    }
  }
});

// ── 登入 ──
function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  const err = document.getElementById('login-error');

  const matched = ACCOUNTS.some(a => a.username === u && a.password === p);
  if (matched) {
    err.style.display = 'none';
    switchScreen('game');
    loadLevel(0);
  } else {
    err.style.display = 'block';
    document.getElementById('login-screen').classList.remove('shake');
    void document.getElementById('login-screen').offsetWidth;
    document.getElementById('login-screen').classList.add('shake');
  }
}

// ── 畫面切換 ──
function switchScreen(name) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'none';
  document.getElementById('win-screen').style.display   = 'none';

  if (name === 'login') {
    document.getElementById('login-screen').style.display = 'flex';
    document.body.classList.remove('in-game');
  }
  if (name === 'game') {
    document.getElementById('game-screen').style.display = 'flex';
    document.body.classList.add('in-game');
    BgMusic.start();
  }
  if (name === 'win') {
    document.getElementById('win-screen').style.display = 'flex';
    document.body.classList.add('in-game');
    BgMusic.fadeOut();
  }
}

// ── 載入關卡 ──
function loadLevel(idx) {
  currentLevel  = idx;
  answerLocked  = false;
  const lv = LEVELS[idx];

  // 進度條
  document.getElementById('progress-bar').style.width = (idx / LEVELS.length * 100) + '%';
  document.getElementById('level-num').textContent = idx + 1;

  // 圖片
  const img  = document.getElementById('game-img');
  const ph   = document.getElementById('img-placeholder');
  img.style.display = 'block';
  ph.style.display  = 'none';
  document.getElementById('placeholder-text').textContent = '圖片載入中…';
  img.src = lv.img;

  // 重設輸入
  const input = document.getElementById('answer-input');
  input.value = '';
  input.className = '';
  input.focus();

  // 清除回饋
  hideFeedback();
}

// ── 驗證答案 ──
function checkAnswer() {
  if (answerLocked) return;

  const input = document.getElementById('answer-input');
  const val   = input.value.trim();

  if (val === '') {
    input.focus();
    return;
  }

  const userAns    = parseInt(val, 10);
  const correctAns = LEVELS[currentLevel].answer;

  if (userAns === correctAns) {
    // 答對：重置連錯計數
    wrongStreak  = 0;
    answerLocked = true;
    input.classList.add('input-correct');
    showCongrats(currentLevel);

  } else {
    // 答錯
    wrongStreak++;
    input.classList.add('input-wrong');

    // 震動效果
    const card = document.getElementById('game-screen');
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');

    if (wrongStreak >= 3) {
      wrongStreak = 0;
      setTimeout(() => lockScreen(), 400);
    } else {
      showFeedback('wrong', `❌ 答錯了！再試一次吧（已答錯 ${wrongStreak}/3 次）`);
      setTimeout(() => {
        input.classList.remove('input-wrong');
        input.value = '';
        input.focus();
      }, 700);
    }
  }
}

// ── 恭喜彈出畫面（5秒倒數）──
function showCongrats(levelIdx) {
  const c      = CONGRATS[levelIdx % CONGRATS.length];
  const ans    = LEVELS[levelIdx].answer;
  const loc    = MESSAGES[ans];

  document.getElementById('congrats-emoji').textContent = c.emoji;
  document.getElementById('congrats-msg').textContent   = c.msg;

  const locEl = document.getElementById('congrats-location');
  locEl.innerHTML = `<strong>📍 ${loc.place}</strong>${loc.text}`;

  const overlay = document.getElementById('congrats-overlay');
  const numEl   = document.getElementById('countdown-num');
  let   seconds = 5;
  numEl.textContent = seconds;
  overlay.classList.add('show');

  BgMusic.fadeOut();
  playVictorySound();
  launchConfetti();

  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    seconds--;
    numEl.textContent = seconds;
    if (seconds <= 0) {
      clearInterval(countdownTimer);
      stopConfetti();
      overlay.classList.remove('show');
      if (currentLevel + 1 >= LEVELS.length) {
        switchScreen('win');
        launchFireworks();
      } else {
        loadLevel(currentLevel + 1);
        BgMusic.start();
      }
    }
  }, 1000);
}

// ── 過關音效（Web Audio API）──
function playVictorySound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523, 659, 784, 1047]; // C E G C（勝利和弦）
    notes.forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.15;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.35, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.start(t);
      osc.stop(t + 0.5);
    });
  } catch(e) {}
}

// ── 灑花（Canvas confetti）──
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors  = ['#ffd700','#ff6b6b','#7c3aed','#22c55e','#f5a623','#38bdf8','#fb7185'];
  const pieces  = Array.from({ length: 120 }, () => ({
    x:    Math.random() * canvas.width,
    y:    Math.random() * canvas.height - canvas.height,
    w:    6 + Math.random() * 8,
    h:    10 + Math.random() * 8,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot:  Math.random() * Math.PI * 2,
    vx:   (Math.random() - 0.5) * 3,
    vy:   2 + Math.random() * 4,
    vr:   (Math.random() - 0.5) * 0.2,
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x  += p.vx;
      p.y  += p.vy;
      p.rot += p.vr;
      if (p.y > canvas.height) {
        p.y = -20;
        p.x = Math.random() * canvas.width;
      }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    confettiAnim = requestAnimationFrame(draw);
  }
  cancelAnimationFrame(confettiAnim);
  draw();
}

function stopConfetti() {
  cancelAnimationFrame(confettiAnim);
  const canvas = document.getElementById('confetti-canvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

// ══════════════════════════════════════════════
// ── 背景緊張音樂（Web Audio API 合成）──
// ══════════════════════════════════════════════
const BgMusic = (() => {
  let ctx = null, master = null, loopTimer = null, active = false;
  let noiseBuf = null;
  const BPM = 132, BEAT = 60 / BPM, BAR = BEAT * 8;

  function makeNoise() {
    const len  = ctx.sampleRate * 0.08;
    const buf  = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    return buf;
  }

  function osc(type, freq, t, dur, vol = 0.2) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(master);
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.02);
  }

  function kick(t) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(master);
    o.frequency.setValueAtTime(160, t);
    o.frequency.exponentialRampToValueAtTime(40, t + 0.18);
    g.gain.setValueAtTime(0.9, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    o.start(t); o.stop(t + 0.3);
  }

  function hihat(t, vol = 0.06) {
    if (!noiseBuf) return;
    const src = ctx.createBufferSource();
    src.buffer = noiseBuf;
    const hpf = ctx.createBiquadFilter();
    hpf.type = 'highpass'; hpf.frequency.value = 8000;
    const g = ctx.createGain();
    src.connect(hpf); hpf.connect(g); g.connect(master);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    src.start(t); src.stop(t + 0.06);
  }

  function schedBar(t) {
    if (!active) return;

    // Kick: 拍1,3,5,7
    [0, 2, 4, 6].forEach(b => kick(t + b * BEAT));

    // Hi-hat: 每8分音符
    for (let i = 0; i < 16; i++)
      hihat(t + i * BEAT * 0.5, i % 2 === 0 ? 0.09 : 0.04);

    // Bass 走句 (Am 小調)
    [55, 55, 58, 55, 52, 55, 57, 55]
      .forEach((f, i) => osc('sawtooth', f, t + i * BEAT, BEAT * 0.65, 0.28));

    // 和弦墊（緊張感）
    [[220,261,330],[208,247,311],[196,233,294],[220,261,330]]
      .forEach(([a, b, c], i) => {
        const s = t + i * 2 * BEAT, d = BEAT * 1.7;
        osc('sawtooth', a, s, d, 0.05);
        osc('sawtooth', b, s, d, 0.04);
        osc('sawtooth', c, s, d, 0.03);
      });

    // 旋律線（上升緊張感）
    [440, 466, 494, 523, 466, 440, 494, 523]
      .forEach((f, i) => osc('square', f, t + i * BEAT, BEAT * 0.38, 0.07));

    loopTimer = setTimeout(() => schedBar(t + BAR), (BAR - 0.15) * 1000);
  }

  return {
    start() {
      if (active) return;
      try {
        ctx    = new (window.AudioContext || window.webkitAudioContext)();
        master = ctx.createGain();
        master.gain.value = 0;
        master.connect(ctx.destination);
        master.gain.linearRampToValueAtTime(0.55, ctx.currentTime + 2);
        noiseBuf = makeNoise();
        active   = true;
        schedBar(ctx.currentTime + 0.05);
      } catch(e) {}
    },
    fadeOut(cb) {
      if (!active || !ctx) { if (cb) cb(); return; }
      active = false;
      clearTimeout(loopTimer);
      const now = ctx.currentTime;
      master.gain.cancelScheduledValues(now);
      master.gain.setValueAtTime(master.gain.value, now);
      master.gain.linearRampToValueAtTime(0, now + 0.8);
      setTimeout(() => {
        try { ctx.close(); } catch(e) {}
        ctx = null; master = null; noiseBuf = null;
        if (cb) cb();
      }, 900);
    }
  };
})();

// ── 鎖定畫面（連錯3次，鎖3分鐘）──
function lockScreen() {
  const overlay  = document.getElementById('lock-overlay');
  const timerEl  = document.getElementById('lock-timer');
  const input    = document.getElementById('answer-input');
  const btn      = document.querySelector('#game-screen .btn');

  input.disabled = true;
  btn.disabled   = true;
  answerLocked   = true;
  hideFeedback();
  input.classList.remove('input-wrong');
  input.value = '';

  overlay.classList.add('show');
  BgMusic.fadeOut();

  let remaining = 3 * 60;

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = String(s % 60).padStart(2, '0');
    return `${m}:${sec}`;
  }
  timerEl.textContent = fmt(remaining);

  clearInterval(lockTimer);
  lockTimer = setInterval(() => {
    remaining--;
    timerEl.textContent = fmt(remaining);
    if (remaining <= 0) {
      clearInterval(lockTimer);
      overlay.classList.remove('show');
      input.disabled  = false;
      btn.disabled    = false;
      answerLocked    = false;
      input.focus();
      BgMusic.start();
    }
  }, 1000);
}

function showFeedback(type, msg) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + type;
  fb.textContent = msg;
  fb.style.display = 'block';
}
function hideFeedback() {
  const fb = document.getElementById('feedback');
  fb.style.display = 'none';
}

// ── 重新開始 ──
function restartGame() {
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  switchScreen('login');
}

// ── 煙火效果 ──
function launchFireworks() {
  for (let i = 0; i < 12; i++) {
    setTimeout(() => spawnFirework(), i * 180);
  }
}
function spawnFirework() {
  const colors = ['#ffd700','#ff6b6b','#7c3aed','#22c55e','#f5a623','#e94560'];
  const x = Math.random() * window.innerWidth;
  const y = Math.random() * window.innerHeight * 0.7;

  for (let p = 0; p < 18; p++) {
    const particle = document.createElement('div');
    particle.className = 'firework';
    const angle = (p / 18) * Math.PI * 2;
    const dist  = 60 + Math.random() * 80;
    const size  = 6 + Math.random() * 6;
    particle.style.cssText = `
      left:${x}px; top:${y}px;
      width:${size}px; height:${size}px;
      border-radius:50%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
    `;
    document.body.appendChild(particle);

    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;

    particle.animate([
      { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
      { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
    ], { duration: 700 + Math.random() * 400, easing: 'ease-out', fill: 'forwards' })
      .onfinish = () => particle.remove();
  }
}
